<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Keuangan Modern</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
  min-height:100vh;
  padding:25px;
  color:white;
  transition:0.4s;
}

body.light{
  background:linear-gradient(135deg,#dbeafe,#f8fafc,#e2e8f0);
  color:#111827;
}

.container{
  max-width:1000px;
  margin:auto;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:30px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
  margin-bottom:25px;
}

.header img{
  width:120px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.title h1{
  font-size:32px;
}

.title p{
  margin-top:5px;
  color:#cbd5e1;
}

.account{
  margin-top:10px;
  color:#93c5fd;
  font-weight:600;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.input-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

label{
  display:block;
  margin-bottom:8px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:white;
  outline:none;
}

body.light input{
  color:black;
}

input::placeholder{
  color:#cbd5e1;
}

.btn{
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:white;
  cursor:pointer;
  font-weight:600;
  width:100%;
}

.btn:hover{
  transform:scale(1.02);
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:25px;
  overflow:hidden;
  border-radius:15px;
}

th{
  background:#2563eb;
  padding:15px;
}

td{
  padding:14px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.income{
  background:rgba(34,197,94,0.2);
}

.expense{
  background:rgba(239,68,68,0.2);
}

.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:25px;
}

.box{
  padding:25px;
  border-radius:20px;
  text-align:center;
}

.masuk{
  background:rgba(34,197,94,0.2);
}

.keluar{
  background:rgba(239,68,68,0.2);
}

.saldo{
  background:rgba(59,130,246,0.2);
}

canvas{
  margin-top:30px;
  background:white;
  border-radius:20px;
  padding:10px;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="title">
    <h1>💰 Laporan Keuangan</h1>
    <p>Kelola uang dengan tampilan modern</p>
    <div class="account">Account : Raihandhika</div>
  </div>

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">
</div>

<div class="grid">
  <div class="card">
    <label>Nama</label>
    <input type="text" id="nama" placeholder="Masukkan nama">
  </div>

  <div class="card">
    <label>Tanggal</label>
    <input type="date" id="tanggal">
  </div>
</div>

<div class="card">

<div class="input-grid">

<div>
<label>Keterangan</label>
<input type="text" id="keterangan" placeholder="Contoh: Gaji">
</div>

<div>
<label>Jenis</label>
<input type="text" id="jenis" placeholder="Pemasukan / Pengeluaran">
</div>

<div>
<label>Jumlah</label>
<input type="number" id="jumlah" placeholder="Masukkan nominal uang">
</div>

</div>

<button class="btn" onclick="tambahData()">+ Tambah Data</button>
<button class="btn" onclick="toggleMode()">🌙 Ganti Mode</button>
<button class="btn" onclick="exportData()">📄 Export Data</button>

</div>

<table id="tabelKeuangan">
<tr>
<th>No</th>
<th>Keterangan</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Aksi</th>
</tr>
</table>

<div class="summary">
<div class="box masuk">
<h3>Total Pemasukan</h3>
<p id="totalMasuk">Rp 0</p>
</div>

<div class="box keluar">
<h3>Total Pengeluaran</h3>
<p id="totalKeluar">Rp 0</p>
</div>

<div class="box saldo">
<h3>Sisa Saldo</h3>
<p id="saldo">Rp 0</p>
</div>
</div>

<canvas id="chartKeuangan"></canvas>

</div>

<script>

let nomor = 1;
let pemasukan = 0;
let pengeluaran = 0;

const ctx = document.getElementById('chartKeuangan');

const chart = new Chart(ctx, {
  type:'doughnut',
  data:{
    labels:['Pemasukan','Pengeluaran'],
    datasets:[{
      data:[0,0],
      backgroundColor:['#22c55e','#ef4444']
    }]
  }
});

window.onload = function(){
  const data = JSON.parse(localStorage.getItem('dataKeuangan'));

  if(data){
    nomor = data.nomor;
    pemasukan = data.pemasukan;
    pengeluaran = data.pengeluaran;

    document.getElementById('tabelKeuangan').innerHTML = data.tabel;

    updateTotal();
    updateChart();
  }
}

function tambahData(){

  const keterangan = document.getElementById('keterangan').value;
  const jenis = document.getElementById('jenis').value;
  const jumlah = parseInt(document.getElementById('jumlah').value);

  if(keterangan === '' || jenis === '' || isNaN(jumlah)){
    alert('Isi semua data!');
    return;
  }

  const tabel = document.getElementById('tabelKeuangan');
  const row = tabel.insertRow();

  if(jenis.toLowerCase() === 'pemasukan'){
    row.className = 'income';
    pemasukan += jumlah;
    alert('🎉 Selamat uang kamu bertambah!');
  }else{
    row.className = 'expense';
    pengeluaran += jumlah;
    alert('😢 Yah.... kekuras lagi deh');
  }

  row.innerHTML = `
    <td>${nomor++}</td>
    <td>${keterangan}</td>
    <td>${jenis}</td>
    <td>Rp ${jumlah.toLocaleString('id-ID')}</td>
    <td><button onclick="hapusBaris(this, '${jenis.toLowerCase()}', ${jumlah})">🗑</button></td>
  `;

  updateTotal();
  updateChart();
  simpanData();

  document.getElementById('keterangan').value='';
  document.getElementById('jenis').value='';
  document.getElementById('jumlah').value='';
}

function hapusBaris(btn, jenis, jumlah){

  btn.parentElement.parentElement.remove();

  if(jenis === 'pemasukan'){
    pemasukan -= jumlah;
  }else{
    pengeluaran -= jumlah;
  }

  updateTotal();
  updateChart();
  simpanData();
}

function updateTotal(){

  document.getElementById('totalMasuk').innerHTML =
  'Rp ' + pemasukan.toLocaleString('id-ID');

  document.getElementById('totalKeluar').innerHTML =
  'Rp ' + pengeluaran.toLocaleString('id-ID');

  document.getElementById('saldo').innerHTML =
  'Rp ' + (pemasukan-pengeluaran).toLocaleString('id-ID');
}

function updateChart(){
  chart.data.datasets[0].data = [pemasukan,pengeluaran];
  chart.update();
}

function simpanData(){

  const data = {
    nomor,
    pemasukan,
    pengeluaran,
    tabel: document.getElementById('tabelKeuangan').innerHTML
  }

  localStorage.setItem('dataKeuangan', JSON.stringify(data));
}

function toggleMode(){
  document.body.classList.toggle('light');
}

function exportData(){

  const isi = document.getElementById('tabelKeuangan').innerText;

  const blob = new Blob([isi],{type:'text/plain'});

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'laporan_keuangan.txt';
  a.click();
}

</script>

</body>
</html>
